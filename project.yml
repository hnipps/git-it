name: LogseqGit
options:
  bundleIdPrefix: com.logseqgit
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 94PCS992NY
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftGit2:
    url: https://github.com/joehinkle11/SwiftGit3.git
    from: "1.2.2"

targets:
  LogseqGit:
    type: application
    platform: iOS
    sources:
      - path: LogseqGit
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logseqgit.app
        INFOPLIST_FILE: LogseqGit/Info.plist
        CODE_SIGN_ENTITLEMENTS: LogseqGit/LogseqGit.entitlements
    dependencies:
      - package: SwiftGit2
      - target: FileProviderExtension
    info:
      path: LogseqGit/Info.plist
    entitlements:
      path: LogseqGit/LogseqGit.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.logseqgit

  LogseqGitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LogseqGitTests
    dependencies:
      - target: LogseqGit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logseqgit.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LogseqGit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LogseqGit"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LogseqGitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LogseqGitUITests
      - path: Shared
    dependencies:
      - target: LogseqGit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logseqgit.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LogseqGit
        DEVELOPMENT_TEAM: 94PCS992NY

  FileProviderExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: FileProviderExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logseqgit.app.FileProvider
        INFOPLIST_FILE: FileProviderExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FileProviderExtension/FileProviderExtension.entitlements
    info:
      path: FileProviderExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionFileProviderDocumentGroup: group.com.logseqgit
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FileProviderExtension
          NSExtensionFileProviderSupportsEnumeration: true
    entitlements:
      path: FileProviderExtension/FileProviderExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.logseqgit
